services:
  - type: web
    name: medicare-pharmacy-portal
    runtime: python
    plan: free
    rootDir: Medicare_Portal
    autoDeployTrigger: commit
    buildCommand: ./build.sh
    startCommand: gunicorn medicare_portal.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          name: medicare-pharmacy-portal
          type: web
          property: host
      - key: GROQ_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: VOICE_BOT_URL
        sync: false
      - key: WHATSAPP_BOT_URL
        sync: false

  - type: web
    name: medicare-pharmacy-whatsapp-bot
    runtime: python
    plan: free
    rootDir: whatsapp_bot
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DJANGO_APP_URL
        sync: false
